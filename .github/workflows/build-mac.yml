name: Build Mac Executable

on:
  push:
    branches: [ "main" ] # Sẽ tự động chạy khi bạn push code lên nhánh main

jobs:
  build:
    runs-on: macos-latest # Sử dụng máy chủ macOS của GitHub

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Thay đổi phiên bản Python của bạn
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt # Bỏ comment dòng này nếu bạn có file requirements

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile hud_quiz_app.py # Thay 'your_script.py' bằng tên file của bạn

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-executable
        path: dist/your_script # File đầu ra sẽ nằm ở đây